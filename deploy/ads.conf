# FMDO /ads reverse proxy → Node app on localhost:8080 (PM2 process "fmdo")
# Included inside the www.fmdigitalofficial.com :443 server block.
location = /ads { return 301 /ads/; }
location /ads/ {
    proxy_pass http://localhost:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Clean shareable form link at the site root: www.fmdigitalofficial.com/b2b
# → same Node app's /b2b route (form-only page). API calls go to /ads/api.
location = /b2b {
    proxy_pass http://localhost:8080/b2b;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
