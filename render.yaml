# Render blueprint — runs the full FMDO app (static site + Express backend)
# on one always-on server. One-click deploy: https://render.com/deploy
services:
  - type: web
    name: fmdo
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "22"
